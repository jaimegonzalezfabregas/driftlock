name: Build Web Export

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.5.2

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export-web:
    name: Export to HTML5
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -v -p $HOME/.local/share/godot/export_templates/
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable $HOME/.local/share/godot/export_templates/
          fi
          echo "=== templates ==="
          ls -R $HOME/.local/share/godot/export_templates/

      - name: Pre-heat Import Cache
        run: godot --headless --editor --quit || true

      - name: Web Build
        id: build
        run: |
          mkdir -p build/web
          EXPORT_DIR="$(readlink -f build)"
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html" > godot_output.txt 2>&1 || echo "EXIT_CODE=$?" >> godot_output.txt
          cat godot_output.txt

      - name: Upload Godot Output (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-output
          path: godot_output.txt
          retention-days: 1

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/web
