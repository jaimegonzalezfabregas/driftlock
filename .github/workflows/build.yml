name: Build Web Export

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.5.2

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export-web:
    name: Export to HTML5
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          echo "HOME=$HOME"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la /root/.local/share/godot/export_templates/ 2>/dev/null || echo "no root templates"
          ls -la ~/.local/share/godot/export_templates/ 2>/dev/null || echo "no home templates"
          godot --version

      - name: Web Build
        env:
          HOME: /root
        run: |
          mkdir -p /tmp/export/web
          godot --headless --verbose --path "$GITHUB_WORKSPACE" --export-release "Web" /tmp/export/web/index.html > /tmp/godot_output.txt 2>&1
          EXIT_CODE=$?
          echo "GODOT_EXIT_CODE=$EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            cat /tmp/godot_output.txt | tail -100
          fi
          exit $EXIT_CODE

      - name: Upload Godot Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-output
          path: /tmp/godot_output.txt

      - name: Upload Pages Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/export/web/

  deploy-pages:
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    needs: export-web
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
