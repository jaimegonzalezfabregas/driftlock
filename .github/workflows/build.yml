name: Build Web Export

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.5.2

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export-web:
    name: Export to HTML5
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Diagnostics
        run: |
          godot --version
          echo "---"
          pwd
          ls -la
          echo "--- export_presets ---"
          cat export_presets.cfg

      - name: Pre-heat Import Cache
        run: |
          godot --headless --editor --quit --path . || true

      - name: Export Web Release
        run: |
          mkdir -p build/web
          xvfb-run godot --headless --verbose --export-release "Web" build/web/index.html 2>&1 | tail -50

      - name: Flatten Build for Pages
        run: |
          if [ -d "build/web/Web" ]; then
            mv build/web/Web/* build/web/
            rm -rf build/web/Web
          fi
          echo "=== build/web contents ==="
          ls -lh build/web/ 2>/dev/null || echo "(empty)"

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
