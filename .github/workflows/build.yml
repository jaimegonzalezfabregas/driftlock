name: Build Web Export

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.5.2
  PROJECT_PATH: .

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export-web:
    name: Export to HTML5
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Web Build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"

      - name: Upload Godot Output
        if: failure()
        run: |
          cat /root/.local/share/godot/export_templates/ 2>/dev/null
          ls -la /root/.local/share/godot/export_templates/ 2>/dev/null
          ls -la ~/.local/share/godot/export_templates/ 2>/dev/null

      - name: Upload Pages Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy-pages:
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    needs: export-web
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
